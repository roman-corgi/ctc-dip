name: Self Diagnositics
run-name: ${{ github.actor }} is verifying code for merge compliance
on: [pull_request]
jobs:
  Build:
    name: Generating Code
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          architecture: 'x64'
          python-version: '3.12'
      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils
      - name: Prepare Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r .github/workflows/requirements.txt
      - name: build
        run: tools/build.sh ignore_checks
  PyTesting:
    needs: Build
    name: Test with Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          architecture: 'x64'
          python-version: '3.12'
      - name: Prepare Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r .github/workflows/requirements.txt
          cp dip/__init__.py pip.install.save
          pip install .
          mv pip.install.save dip/__init__.py
      - name: pytest
        run: pytest --cov=dawgie --cov-branch --cov-report term-missing -v test
